version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: frostedlane-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frostedlane
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frostedlane-web
    restart: unless-stopped
    ports:
      - "3500:3500"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/frostedlane?schema=public
      JWT_SECRET: frosted-lane-super-secret-jwt-key-2024
      JWT_EXPIRES_IN: 24h
      ADMIN_EMAIL: admin@frostedlane.com
      ADMIN_PASSWORD: admin123
      NEXT_PUBLIC_APP_URL: http://localhost:3500
      PORT: 3500

volumes:
  pgdata:
